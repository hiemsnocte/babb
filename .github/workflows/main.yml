# 스케줄(capture): 한국시간 10:30·11:30, 21:30·22:00 (UTC cron 아래 참고)
# [필수] GitHub Pages 최초 1회: 레포 Settings → Pages → Build and deployment
#       → Source 를 "GitHub Actions" 로 선택 (안 하면 deploy job 이 404로 실패함)
#
name: Menu bot & GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/main.yml'
  schedule:
    # 2시간 간격으로 실행 (하루 12회)
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: menu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  capture:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium (Puppeteer)
        run: npx puppeteer browsers install chrome

      - name: Run capture bot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: node capture.js

      - name: Upload capture artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: capture-failure
          path: |
            menu_*.png
          if-no-files-found: ignore

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v5
